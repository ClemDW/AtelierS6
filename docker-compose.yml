networks:
  photopro.net:
    driver: bridge

services:
  gatewayfront.photopro:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - "${GATEWAY_FRONT_PORT:-6080}:80"
    volumes:
      - ./gateway-front:/var/php
    working_dir: /var/php
    networks:
      - photopro.net
    command: "sh -lc '[ -d vendor ] || composer install --no-interaction --prefer-dist; php -S 0.0.0.0:80 -t /var/php/public'"

  gatewayback.photopro:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - "${GATEWAY_BACK_PORT:-6081}:80"
    volumes:
      - ./gateway-back:/var/php
    working_dir: /var/php
    networks:
      - photopro.net
    command: "sh -lc '[ -d vendor ] || composer install --no-interaction --prefer-dist; php -S 0.0.0.0:80 -t /var/php/public'"

  service-auth.photopro:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT:-6084}:80"
    volumes:
      - ./app-auth:/var/php
    working_dir: /var/php
    networks:
      - photopro.net
    depends_on:
      - user.db
    command: "sh -lc '[ -d vendor ] || composer install --no-interaction --prefer-dist; php -S 0.0.0.0:80 -t /var/php/public'"

  service-galerie.photopro:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - "${GALERIE_SERVICE_PORT:-6082}:80"
    volumes:
      - ./app-galerie:/var/php
    working_dir: /var/php
    networks:
      - photopro.net
    depends_on:
      - galerie.db
    command: "sh -lc '[ -d vendor ] || composer install --no-interaction --prefer-dist; php -S 0.0.0.0:80 -t /var/php/public'"

  service-storage.photopro:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - "${STORAGE_SERVICE_PORT:-6083}:80"
    volumes:
      - ./app-storage:/var/php
      - ./sql:/var/data
    working_dir: /var/php
    networks:
      - photopro.net
    env_file:
      - ./env/storage.env
    depends_on:
      - S3
      - galerie.db
      - rabbitmq
    command: "sh -lc 'composer install --no-interaction --prefer-dist; composer require php-amqplib/php-amqplib:^3.7 --no-interaction --prefer-dist; php -S 0.0.0.0:80 -t /var/php/public'"

  S3:
    image: chrislusf/seaweedfs:latest
    ports:
      - "${S3_PORT:-8333}:8333"
      - "${S3_MASTER_PORT:-9333}:9333"
      - "${S3_FILER_PORT:-23646}:23646"
    command: "server -dir=/data -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json"
    networks:
      - photopro.net
    volumes:
      - ./S3/data:/data
      - ./S3/s3.json:/etc/seaweedfs/s3.json

  #######################################
  ### RabbitMQ Service
  #######################################
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
      - "${RABBITMQ_PORT:-5672}:5672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 8s
      timeout: 30s
      retries: 3
    networks:
      - photopro.net
    volumes:
      - ./rabbitmq.photopro:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-photopro}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-photopro}

  ##############################################
  ### MailCatcher
  ##############################################
  mail.photopro:
    build:
      context: build
      dockerfile: mailcatcher.Dockerfile
    networks:
      - photopro.net
    ports:
      - "${MAILCATCHER_PORT:-1080}:1080"

  ##############################################
  ### Service Mail (consommateur RabbitMQ)
  ##############################################
  service-mail.photopro:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    volumes:
      - ./app-mail:/var/www
    working_dir: /var/www
    networks:
      - photopro.net
    depends_on:
      rabbitmq:
        condition: service_healthy
      mail.photopro:
        condition: service_started
    env_file: ./env/mail.env
    command: "sh -lc '[ -d vendor ] || composer install --no-interaction --prefer-dist; php /var/www/bin/consumer.php'"

  ##############################################
  ### Service Galerie Consumer (RabbitMQ)
  ##############################################
  service-galerie-consumer.photopro:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    volumes:
      - ./app-galerie:/var/www
    working_dir: /var/www
    networks:
      - photopro.net
    depends_on:
      rabbitmq:
        condition: service_healthy
      galerie.db:
        condition: service_started
    env_file: ./env/galerie-consumer.env
    command: "sh -lc '[ -d vendor ] || composer install --no-interaction --prefer-dist; composer require php-amqplib/php-amqplib:^3.7 --no-interaction --prefer-dist; php /var/www/bin/consumer.php'"

  # service photoproprat.db : base de données postgresql pour les praticiens

  galerie.db:
    image: "postgres:latest"
    env_file: ./env/galeriedb.env
    ports:
      - "${GALERIE_DB_PORT:-5432}:5432"
    networks:
      - photopro.net
    volumes:
      - ./sql/db_galery.schema.sql:/docker-entrypoint-initdb.d/01-db_galerie.schema.sql

  user.db:
    image: "postgres:latest"
    env_file: ./env/userdb.env
    ports:
      - "${USER_DB_PORT:-5433}:5432"
    networks:
      - photopro.net
    volumes:
      - ./sql/db_user.schema.sql:/docker-entrypoint-initdb.d/01-db_user.schema.sql

  adminer:
    image: adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - photopro.net
